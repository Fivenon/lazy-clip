<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Lazy Clip</title>
</head>
<body>
    <div class="header">   
        <h2 class="title">Lazy Clip</h2>
    </div>

    <div class="main-content">
        <div class="panel-izquierdo">
            <button class="select-button", id="select-button", onclick="pywebview.api.seleccionar_carpeta()">Seleccionar carpeta</button>
            <p class="path-text", id="path-text">No hay ninguna ruta seleccionada</p>
            <p class="clips-found", id="clips-found">Clips encontrados: 0</p>
            <hr class="rounded">

            <div class="GPU-slider">
                <!-- Rounded switch -->
                <p class="switch-text">Usar GPU</p>
                <span></span>
                <label class="switch">
                <input type="checkbox" id="gpu-switch" onchange="pywebview.api.toggle_gpu(this.checked)">
                <span class="slider round"></span>
                </label>
            </div>
            
        </div>

        <div class="panel-derecho">
            <img id="preview" src="No preview image.jpg" alt="preview">
            <div class="progreso-container" >
                <div class="barra-progreso" id="barra-progreso"></div>
                <p class="progreso-text" id="progreso-text"></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="render-button", id="render-button", onclick="pywebview.api.iniciar_render()">INICIAR RENDER</button>
    </div>
</body>
</html>
