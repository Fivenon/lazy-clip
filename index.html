<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Lazy Clip</title>
</head>
<body>
    <div class="header">   
        <h2 class="title">Lazy Clip</h2>
    </div>

    <div class="main-content">
        <div class="panel-izquierdo">
            <button class="select-button", id="select-button", onclick="pywebview.api.seleccionar_carpeta()">Seleccionar carpeta</button>
            <p class="path-text", id="path-text">No hay ninguna ruta seleccionada</p>
            <p class="clips-found", id="clips-found"> Cantidad de clips encontrados: 0</p>
            
            <!-- Rounded switch -->
             <span>Usar GPU</span>
            <label class="switch">
            <input type="checkbox">
            <span class="slider round"></span>
            </label>
        </div>

        <div class="panel-derecho">
            
        </div>
    </div>

    <div class="footer">
        <button class="render-button", id="render-button", onclick="pywebview.api.iniciar_render()">INICIAR RENDER</button>
    </div>



</body>
</html>
